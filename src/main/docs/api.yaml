openapi: 3.0.3
info:
  title: EventSync API
  description: API for event management and real-time participant engagement
  version: 1.0.0
servers:
  - url: http://localhost:3000/api
    description: Development server
paths:
  /auth/login:
    post:
      summary: Authenticate an administrator
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
        '401':
          description: Invalid credentials
  /auth/participant:
    post:
      summary: Identify or register a participant without authentication
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - firstName
                - lastName
                - email
              properties:
                firstName:
                  type: string
                lastName:
                  type: string
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Participant identified or created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParticipantRef'
  /events:
    get:
      summary: List all events
      tags:
        - Events
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: Page number (starts at 1)
        - name: size
          in: query
          schema:
            type: integer
            default: 20
          description: Number of items per page
      responses:
        '200':
          description: List of events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventList'
    post:
      summary: Create a new event
      tags:
        - Events
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventInput'
      responses:
        '201':
          description: Event created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        '401':
          description: Unauthorized
  /events/{id}:
    get:
      summary: Get event details
      tags:
        - Events
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Détails de l'événement
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventDetail'
        '404':
          description: Event not found
    put:
      summary: Update an event
      tags:
        - Events
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventInput'
      responses:
        '200':
          description: Event updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        '401':
          description: Unauthorized
        '404':
          description: Event not found
    delete:
      summary: Delete an event
      tags:
        - Events
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Event deleted
          content:
            application/json:
              schema:
                type: string
                format: uuid
        '401':
          description: Unauthorized
        '404':
          description: Event not found
  /sessions:
    get:
      summary: List all sessions
      tags:
        - Sessions
      parameters:
        - name: room
          in: query
          schema:
            type: string
          description: Filter by room name
        - name: speaker
          in: query
          schema:
            type: string
          description: Filter by speaker name (matches first or last name)
        - name: live
          in: query
          schema:
            type: boolean
          description: Filter sessions currently live
        - name: event
          in: query
          schema:
            type: string
          description: Filter by event title
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: Page number (starts at 1)
        - name: size
          in: query
          schema:
            type: integer
            default: 20
          description: Number of items per page
      responses:
        '200':
          description: List of sessions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionList'
    post:
      summary: Create a new session
      tags:
        - Sessions
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionInput'
      responses:
        '201':
          description: Session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '401':
          description: Unauthorized
        '409':
          description: Session with this title already exists
  /sessions/{id}:
    get:
      summary: Get session details
      tags:
        - Sessions
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Détails de la session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionDetail'
        '404':
          description: Session not found
    put:
      summary: Update a session
      tags:
        - Sessions
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionInput'
      responses:
        '200':
          description: Session updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '401':
          description: Unauthorized
        '404':
          description: Session not found
    delete:
      summary: Delete a session
      tags:
        - Sessions
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Session deleted
        '401':
          description: Unauthorized
        '404':
          description: Session not found
  /sessions/{id}/questions:
    get:
      summary: List questions of a session
      tags:
        - Questions
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: ID of the session
        - name: sort
          in: query
          schema:
            type: string
            enum: [upvotes, createdAt]
            default: upvotes
          description: Sort order (upvotes descending, or createdAt ascending)
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: Page number (starts at 1)
        - name: size
          in: query
          schema:
            type: integer
            default: 20
          description: Number of items per page
      responses:
        '200':
          description: List of questions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuestionList'
    post:
      summary: Ask a question on a session
      tags:
        - Questions
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: ID of the session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuestionInput'
      responses:
        '201':
          description: Question created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Question'
        '400':
          description: Session not live - questions disabled
  /sessions/{id}/questions/{qid}/upvote:
    post:
      summary: Upvote a question
      tags:
        - Questions
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: ID of the session
        - name: qid
          in: path
          required: true
          schema:
            type: string
          description: ID of the question
      responses:
        '200':
          description: Question upvotée
          content:
            application/json:
              schema:
                type: integer
  /rooms:
    get:
      summary: List all rooms
      tags:
        - Rooms
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: Page number (starts at 1)
        - name: size
          in: query
          schema:
            type: integer
            default: 20
          description: Number of items per page
      responses:
        '200':
          description: List of rooms
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomList'
    post:
      summary: Create a new room
      tags:
        - Rooms
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoomInput'
      responses:
        '201':
          description: Room created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Room'
        '401':
          description: Unauthorized
  /rooms/{id}:
    get:
      summary: Get room details
      tags:
        - Rooms
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Détails de la salle
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Room'
        '404':
          description: Room not found
    put:
      summary: Update a room
      tags:
        - Rooms
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoomInput'
      responses:
        '200':
          description: Room updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Room'
        '401':
          description: Unauthorized
        '404':
          description: Room not found
    delete:
      summary: Delete a room
      tags:
        - Rooms
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Room deleted
        '401':
          description: Unauthorized
        '404':
          description: Room not found
  /speakers:
    get:
      summary: List all speakers
      tags:
        - Speakers
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: Page number (starts at 1)
        - name: size
          in: query
          schema:
            type: integer
            default: 20
          description: Number of items per page
      responses:
        '200':
          description: List of speakers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpeakerList'
    post:
      summary: Create a new speaker
      tags:
        - Speakers
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SpeakerInput'
      responses:
        '201':
          description: Speaker created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Speaker'
        '401':
          description: Unauthorized
  /speakers/{id}:
    get:
      summary: Get speaker details
      tags:
        - Speakers
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Détails de l'intervenant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpeakerDetail'
        '404':
          description: Speaker not found
    put:
      summary: Update a speaker
      tags:
        - Speakers
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SpeakerUpdateInput'
      responses:
        '200':
          description: Speaker updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpeakerUpdateResponse'
        '401':
          description: Unauthorized
        '404':
          description: Speaker not found
    delete:
      summary: Delete a speaker
      tags:
        - Speakers
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Speaker deleted
        '401':
          description: Unauthorized
        '404':
          description: Speaker not found
  /speakers/{id}/external-link:
    put:
      summary: Update speaker external link
      tags:
        - Speakers
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/ExternalLinkInput'
      responses:
        '200':
          description: External links updated
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ExternalLinkInput'
        '401':
          description: Unauthorized
        '404':
          description: Speaker not found
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum:
            - admin
            - speaker
            - participant
    EventRef:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
    EventRefInput:
      type: object
      properties:
        title:
          type: string
    SessionRef:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
    Event:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        location:
          type: string
        createdAt:
          type: string
          format: date-time
    EventList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Event'
        meta:
          type: object
          properties:
            total:
              type: integer
            page:
              type: integer
            size:
              type: integer
    EventDetail:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        location:
          type: string
        createdAt:
          type: string
          format: date-time
        isLive:
          type: boolean
          description: True if at least one session is currently live
        sessions:
          type: array
          items:
            $ref: '#/components/schemas/Session'
    EventInput:
      type: object
      required:
        - title
        - description
        - startDate
        - endDate
        - location
      properties:
        title:
          type: string
        description:
          type: string
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        location:
          type: string
    Session:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        room:
          $ref: '#/components/schemas/Room'
        capacity:
          type: integer
        event:
          $ref: '#/components/schemas/EventRef'
        speakers:
          type: array
          items:
            $ref: '#/components/schemas/SpeakerRef'
        isLive:
          type: boolean
          description: True if the session is live
    SessionForSpeaker:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        room:
          $ref: '#/components/schemas/Room'
        capacity:
          type: integer
        event:
          $ref: '#/components/schemas/EventRef'
        isLive:
          type: boolean
          description: True if the session is live
    SessionDetail:
      type: object
      allOf:
        - $ref: '#/components/schemas/Session'
        - type: object
          properties:
            questions:
              type: array
              items:
                $ref: '#/components/schemas/Question'
    SessionList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Session'
        meta:
          type: object
          properties:
            total:
              type: integer
            page:
              type: integer
            size:
              type: integer
    SessionInput:
      type: object
      required:
        - title
        - description
        - startDate
        - endDate
        - room
        - event
        - speakers
      properties:
        title:
          type: string
        description:
          type: string
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        room:
          $ref: '#/components/schemas/RoomRefInput'
        capacity:
          type: integer
        event:
          $ref: '#/components/schemas/EventRefInput'
        speakers:
          type: array
          items:
            $ref: '#/components/schemas/SpeakerRefInput'
    Room:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
    RoomList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Room'
        meta:
          type: object
          properties:
            total:
              type: integer
            page:
              type: integer
            size:
              type: integer
    RoomInput:
      type: object
      required:
        - name
      properties:
        name:
          type: string
    RoomRefInput:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
    Speaker:
      type: object
      properties:
        id:
          type: string
          format: uuid
        firstName:
          type: string
        lastName:
          type: string
        profilePicture:
          type: string
          format: uri
        bio:
          type: string
        externalLinks:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              url:
                type: string
                format: uri
    SpeakerDetail:
      type: object
      allOf:
        - $ref: '#/components/schemas/Speaker'
        - type: object
          properties:
            sessions:
              type: array
              items:
                $ref: '#/components/schemas/SessionForSpeaker'
    SpeakerRef:
      type: object
      properties:
        id:
          type: string
          format: uuid
        firstName:
          type: string
        lastName:
          type: string
        profilePicture:
          type: string
          format: uri
        bio:
          type: string
    SpeakerRefInput:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
          description: Alternative way to reference speaker by email
    ParticipantRef:
      type: object
      properties:
        id:
          type: string
          format: uuid
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
    SpeakerList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Speaker'
        meta:
          type: object
          properties:
            total:
              type: integer
            page:
              type: integer
            size:
              type: integer
    SpeakerInput:
      type: object
      required:
        - firstName
        - lastName
        - email
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
        profilePicture:
          type: string
          format: uri
        bio:
          type: string
        externalLinks:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              url:
                type: string
                format: uri
    SpeakerUpdateInput:
      type: object
      required:
        - firstName
        - lastName
        - email
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
        profilePicture:
          type: string
          format: uri
        bio:
          type: string
    SpeakerUpdateResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
        profilePicture:
          type: string
          format: uri
        bio:
          type: string
    ExternalLinkInput:
      type: object
      properties:
        name:
          type: string
        url:
          type: string
          format: uri
    Question:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        content:
          type: string
        participant:
          $ref: '#/components/schemas/ParticipantRef'
        upvotes:
          type: integer
        isAnonymous:
          type: boolean
        createdAt:
          type: string
          format: date-time
    QuestionList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Question'
        meta:
          type: object
          properties:
            total:
              type: integer
            page:
              type: integer
            size:
              type: integer
    QuestionInput:
      type: object
      required:
        - content
      properties:
        title:
          type: string
        content:
          type: string
        participant:
          $ref: '#/components/schemas/ParticipantRef'
        isAnonymous:
          type: boolean
          default: false