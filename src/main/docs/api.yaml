openapi: 3.0.3
info:
  title: EventSync API
  description: API for event management and real-time participant engagement
  version: 1.0.0
servers:
  - url: http://localhost:3000/api
    description: Development server
paths:
  /auth/login:
    post:
      summary: Authenticate an administrator
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
        '401':
          description: Invalid credentials
  /events:
    get:
      summary: List all events
      tags:
        - Events
      parameters:
        - name: live
          in: query
          schema:
            type: boolean
          description: Filter for live sessions
      responses:
        '200':
          description: List of events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventList'
    post:
      summary: Create a new event
      tags:
        - Events
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventInput'
      responses:
        '201':
          description: Event created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        '401':
          description: Unauthorized
  /events/{id}:
    get:
      summary: Get event details
      tags:
        - Events
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Détails de l'événement
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        '404':
          description: Event not found
    put:
      summary: Update an event
      tags:
        - Events
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventInput'
      responses:
        '200':
          description: Event updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        '401':
          description: Unauthorized
        '404':
          description: Event not found
    delete:
      summary: Delete an event
      tags:
        - Events
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Event deleted
        '401':
          description: Unauthorized
        '404':
          description: Event not found
  /events/{id}/sessions:
    get:
      summary: List sessions of an event
      tags:
        - Sessions
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: ID of the event
        - name: live
          in: query
          schema:
            type: boolean
          description: Filtrer les sessions en cours
      responses:
        '200':
          description: List of sessions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionList'
  /sessions:
    get:
      summary: List all sessions
      tags:
        - Sessions
      parameters:
        - name: room
          in: query
          schema:
            type: string
          description: Filter by room
        - name: live
          in: query
          schema:
            type: boolean
          description: Filtrer les sessions en cours
      responses:
        '200':
          description: List of sessions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionList'
    post:
      summary: Create a new session
      tags:
        - Sessions
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionInput'
      responses:
        '201':
          description: Session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '401':
          description: Unauthorized
        '409':
          description: Session with this title already exists
  /sessions/{id}:
    get:
      summary: Get session details
      tags:
        - Sessions
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Détails de la session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '404':
          description: Session not found
    put:
      summary: Update a session
      tags:
        - Sessions
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionInput'
      responses:
        '200':
          description: Session updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '401':
          description: Unauthorized
        '404':
          description: Session not found
    delete:
      summary: Delete a session
      tags:
        - Sessions
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Session deleted
        '401':
          description: Unauthorized
        '404':
          description: Session not found
  /sessions/{id}/questions:
    get:
      summary: List questions of a session
      tags:
        - Questions
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: ID of the session
      responses:
        '200':
          description: List of questions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuestionList'
    post:
      summary: Ask a question on a session
      tags:
        - Questions
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: ID of the session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuestionInput'
      responses:
        '201':
          description: Question created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Question'
        '400':
          description: Session not live - questions disabled
  /sessions/{id}/questions/{qid}/upvote:
    post:
      summary: Upvote a question
      tags:
        - Questions
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: ID of the session
        - name: qid
          in: path
          required: true
          schema:
            type: string
          description: ID of the question
      responses:
        '200':
          description: Question upvotée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Question'
  /rooms:
    get:
      summary: List all rooms
      tags:
        - Rooms
      responses:
        '200':
          description: List of rooms
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomList'
    post:
      summary: Create a new room
      tags:
        - Rooms
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoomInput'
      responses:
        '201':
          description: Room created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Room'
        '401':
          description: Unauthorized
  /rooms/{id}:
    get:
      summary: Get room details
      tags:
        - Rooms
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Détails de la salle
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Room'
        '404':
          description: Room not found
    put:
      summary: Update a room
      tags:
        - Rooms
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoomInput'
      responses:
        '200':
          description: Room updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Room'
        '401':
          description: Unauthorized
        '404':
          description: Room not found
    delete:
      summary: Delete a room
      tags:
        - Rooms
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Room deleted
        '401':
          description: Unauthorized
        '404':
          description: Room not found
  /speakers:
    get:
      summary: List all speakers
      tags:
        - Speakers
      responses:
        '200':
          description: List of speakers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpeakerList'
    post:
      summary: Create a new speaker
      tags:
        - Speakers
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SpeakerInput'
      responses:
        '201':
          description: Speaker created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Speaker'
        '401':
          description: Unauthorized
  /speakers/{id}:
    get:
      summary: Get speaker details
      tags:
        - Speakers
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Détails de l'intervenant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Speaker'
        '404':
          description: Speaker not found
    put:
      summary: Update a speaker
      tags:
        - Speakers
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SpeakerInput'
      responses:
        '200':
          description: Speaker updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Speaker'
        '401':
          description: Unauthorized
        '404':
          description: Speaker not found
    delete:
      summary: Delete a speaker
      tags:
        - Speakers
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Speaker deleted
        '401':
          description: Unauthorized
        '404':
          description: Speaker not found
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum:
            - admin
            - speaker
            - participant
    Event:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        location:
          type: string
        createdAt:
          type: string
          format: date-time
        sessions:
          type: array
          items:
            $ref: '#/components/schemas/Session'
    EventList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Event'
        meta:
          type: object
          properties:
            total:
              type: integer
            page:
              type: integer
    EventInput:
      type: object
      required:
        - title
        - description
        - startDate
        - endDate
        - location
      properties:
        title:
          type: string
        description:
          type: string
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        location:
          type: string
    Session:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        room:
          $ref: '#/components/schemas/Room'
        capacity:
          type: integer
        eventId:
          type: string
          format: uuid
        speakers:
          type: array
          items:
            $ref: '#/components/schemas/Speaker'
        isLive:
          type: boolean
          description: True if the session is live
    SessionList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Session'
        meta:
          type: object
          properties:
            total:
              type: integer
            page:
              type: integer
    SessionInput:
      type: object
      required:
        - title
        - description
        - startDate
        - endDate
        - roomId
        - eventId
        - speakerIds
      properties:
        title:
          type: string
        description:
          type: string
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        roomId:
          type: string
          format: uuid
        capacity:
          type: integer
        eventId:
          type: string
          format: uuid
        speakerIds:
          type: array
          items:
            type: string
            format: uuid
    Room:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
    RoomList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Room'
        meta:
          type: object
          properties:
            total:
              type: integer
    RoomInput:
      type: object
      required:
        - name
      properties:
        name:
          type: string
    Speaker:
      type: object
      properties:
        id:
          type: string
          format: uuid
        firstName:
          type: string
        lastName:
          type: string
        profilePicture:
          type: string
          format: uri
        bio:
          type: string
        externalLinks:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              url:
                type: string
                format: uri
        sessions:
          type: array
          items:
            $ref: '#/components/schemas/Session'
    SpeakerList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Speaker'
        meta:
          type: object
          properties:
            total:
              type: integer
    SpeakerInput:
      type: object
      required:
        - firstName
        - lastName
        - email
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
        profilePicture:
          type: string
          format: uri
        bio:
          type: string
        externalLinks:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              url:
                type: string
                format: uri
    Question:
      type: object
      properties:
        id:
          type: string
          format: uuid
        content:
          type: string
        authorName:
          type: string
          description: Null if anonymous
        upvotes:
          type: integer
        isAnonyme:
          type: boolean
        createdAt:
          type: string
          format: date-time
        sessionId:
          type: string
          format: uuid
    QuestionList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Question'
        meta:
          type: object
          properties:
            total:
              type: integer
    QuestionInput:
      type: object
      required:
        - content
      properties:
        content:
          type: string
        authorName:
          type: string
          description: Optional - if absent, question is anonymous
        isAnonyme:
          type: boolean
          default: false